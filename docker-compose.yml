# Official Stack v1.1.6 Configuration
# This docker-compose file runs the Official Stack v1.1.6 services
# To use production services, run: docker compose -f docker-compose.prod.yml up -d

services:
  freqtrade:
    image: plaat2000/official-stack-v1.1.6:freqtrade-official
    container_name: freqtrade-official-local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./user_data:/freqtrade/user_data
    command: ["trade", "-c", "user_data/config.json"]
    networks:
      - freqtrade-net
    environment:
      FT_APP_ENV: docker

  frequi:
    image: plaat2000/official-stack-v1.1.6:frequi-official
    container_name: frequi-official-local
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - freqtrade
    environment:
      API_URL: http://freqtrade-official-local:8080/api/v1
      FT_USERPASS: freqtrader:Eism1gw0100!
    networks:
      - freqtrade-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  postgres:
    image: plaat2000/official-stack-v1.1.6:postgres-official
    container_name: postgres-official-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: freqtrade
      POSTGRES_PASSWORD: official123
      POSTGRES_DB: freqtrade
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - freqtrade-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freqtrade -d freqtrade"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  freqtrade-net:
    driver: bridge
